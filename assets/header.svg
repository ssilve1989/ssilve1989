<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="900" height="100">
  <defs>
    <pattern id="dg" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0.8" cy="0.8" r="0.8" fill="#161b22"/>
    </pattern>
  </defs>

  <rect width="900" height="100" fill="#010409"/>
  <rect width="900" height="100" fill="url(#dg)"/>
  <rect x="0" y="0" width="3" height="100" fill="#00c8ff"/>

  <!-- Reticle — clipped naturally at SVG bounds, creating partial-circle effect -->
  <g transform="translate(836,50)" fill="none" stroke="#00c8ff" opacity="0.07">
    <circle r="108" stroke-width="0.75"/>
    <circle r="72" stroke-width="0.75"/>
    <circle r="36" stroke-width="0.75"/>
    <circle r="8" fill="#00c8ff" stroke="none" opacity="0.5"/>
    <line x1="-118" x2="118" y1="0" y2="0" stroke-width="0.5"/>
    <line x1="0" x2="0" y1="-118" y2="118" stroke-width="0.5"/>
    <line x1="-118" y1="-16" x2="-118" y2="16" stroke-width="1"/>
    <line x1="118" y1="-16" x2="118" y2="16" stroke-width="1"/>
    <line x1="-16" y1="-118" x2="16" y2="-118" stroke-width="1"/>
    <line x1="-16" y1="118" x2="16" y2="118" stroke-width="1"/>
  </g>

  <!-- Primary identity -->
  <text x="24" y="50"
    font-family="'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace"
    font-size="34" font-weight="700" fill="#e6edf3" letter-spacing="1">SOFTWARE ENGINEER</text>

  <!-- Stack descriptor -->
  <text x="26" y="78"
    font-family="'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace"
    font-size="11" fill="#00c8ff" letter-spacing="2">TypeScript · Node.js · gRPC · NestJS · OpenTelemetry</text>
</svg>
